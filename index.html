<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Laboratorio Secreto</title>
<style>
body {
    background: url('laboratorio.jpg') no-repeat center center fixed;
    background-size: cover;
    color: #0f0;
    font-family: 'Courier New', monospace;
    text-align: center;
    padding-top: 50px;
}
h2 {
    font-size: 36px;
    text-shadow: 0 0 10px #0f0;
    margin-bottom: 20px;
}
#mensaje {
    font-size: 20px;
    min-height: 60px;
    margin-bottom: 20px;
    text-align: center;
}
input, button {
    padding: 12px 20px;
    font-size: 18px;
    border-radius: 8px;
    border: 2px solid #0f0;
    background-color: #000;
    color: #0f0;
    margin-top: 10px;
    outline: none;
}
button {
    animation: parpadeo 1s infinite alternate;
}
button:hover {
    background-color: #0f0;
    color: #000;
    cursor: pointer;
}
@keyframes parpadeo {
    from { box-shadow: 0 0 5px #0f0; }
    to { box-shadow: 0 0 20px #0f0; }
}
</style>
</head>
<body>

<h2>Laboratorio Secreto</h2>

<div id="mensaje"></div>

<button id="btn_inicio">Pulsa aquí para activar el laboratorio secreto</button>

<div id="zona_codigo" style="display:none; margin-top:30px;">
    <p>Introduce el código de 4 cifras:</p>
    <input type="text" id="codigo" maxlength="4" autofocus>
    <br>
    <button onclick="verificarCodigo()">Enviar</button>
</div>

<audio id="audio_pista" src="audio_pista.mp3"></audio>
<audio id="musica_fondo" src="musica_fondo.mp3" loop></audio>

<script>
// Frases de error sin repetir hasta que se acaben y volver a empezar
const frasesError = ["buaaa das pena","mongol","destilas mediocridad"];
const codigoCorrecto = "7391"; 

// Función para escribir letra por letra
function escribirMensaje(texto, callback) {
    const cont = document.getElementById('mensaje');
    cont.textContent = "";
    let i = 0;
    const interval = setInterval(()=>{
        cont.textContent += texto[i++];
        if(i>=texto.length){
            clearInterval(interval);
            if(callback) callback();
        }
    }, 50);
}

// Botón inicial
document.getElementById('btn_inicio').addEventListener('click', function(){
    this.style.display='none';
    document.getElementById('zona_codigo').style.display='block';

    const bg = document.getElementById('musica_fondo');
    bg.volume = 0.3;
    bg.play().catch(err=>console.log("Error música: ",err));

    escribirMensaje("Bienvenidos Josin y Emilia al laboratorio secreto, por favor introduzcan el código correcto para desbloquear su siguiente pista");
});

// Verificación del código
function verificarCodigo(){
    const codigo = document.getElementById('codigo').value;
    if(codigo === codigoCorrecto){
        escribirMensaje("Reconocimiento completado, adelante la siguiente pista", ()=>{
            document.getElementById('audio_pista').play().catch(err=>console.log("Error audio pista:",err));
        });
    } else {
        const frase = frasesError[Math.floor(Math.random()*frasesError.length)];
        escribirMensaje(frase);
        document.getElementById('codigo').value="";
        document.getElementById('codigo').focus();
    }
}
</script>

</body>
</html>
