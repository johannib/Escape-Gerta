<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Laboratorio Secreto</title>
<style>
/* Fondo de laboratorio */
body {
    background: url('laboratorio_fondo.jpg') no-repeat center center fixed;
    background-size: cover;
    color: #0f0;
    font-family: 'Courier New', monospace;
    text-align: center;
    padding-top: 50px;
}

/* Título estilo hacker */
h2 {
    font-size: 36px;
    text-shadow: 0 0 10px #0f0;
    margin-bottom: 20px;
}

/* Input y botón con efecto terminal */
input, button {
    padding: 12px 20px;
    font-size: 18px;
    border-radius: 8px;
    border: 2px solid #0f0;
    background-color: #000;
    color: #0f0;
    margin-top: 10px;
    outline: none;
}

/* Efecto hover y parpadeo del botón */
button {
    animation: parpadeo 1s infinite alternate;
}

button:hover {
    background-color: #0f0;
    color: #000;
    cursor: pointer;
}

@keyframes parpadeo {
    from { box-shadow: 0 0 5px #0f0; }
    to { box-shadow: 0 0 20px #0f0; }
}

/* Música ambiental invisible */
#audio_bg {
    display: none;
}
</style>
</head>
<body>

<h2>Laboratorio Secreto</h2>
<p>Introduce el código de 4 cifras:</p>
<input type="text" id="codigo" maxlength="4" autofocus>
<br>
<button onclick="verificarCodigo()">Enviar</button>

<!-- Audio del puzzle -->
<audio id="audio_pista" src="audio_pista.mp3"></audio>
<!-- Música ambiental opcional -->
<audio id="audio_bg" src="musica_fondo.mp3" autoplay loop></audio>

<script>
// Voz robot
function hablar(texto) {
    const synth = window.speechSynthesis;
    const utter = new SpeechSynthesisUtterance(texto);
    utter.lang = 'es-ES';
    utter.pitch = 1.2;
    utter.rate = 0.9;
    synth.speak(utter);
}

// Verificación de código
function verificarCodigo() {
    const codigo = document.getElementById('codigo').value;
    if (codigo === "7391");
        hablar("Bienvenidos agentes Josin y Emilia. Aquí están vuestras instrucciones.");
        const audio = document.getElementById('audio_pista');
        audio.play();
    } else {
        hablar("Código incorrecto, inténtalo de nuevo.");
        document.getElementById('codigo').value = "";
        document.getElementById('codigo').focus();
    }
}
</script>

</body>
</html>
