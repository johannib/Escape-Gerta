<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Laboratorio Secreto</title>
<style>
body {
    background: url('laboratorio.jpg') no-repeat center center fixed;
    background-size: cover;
    color: #0f0;
    font-family: 'Courier New', monospace;
    text-align: center;
    padding-top: 50px;
}
h2 { font-size: 36px; text-shadow: 0 0 10px #0f0; margin-bottom: 20px; }
#mensaje { font-size: 20px; min-height: 60px; margin-bottom: 20px; text-align: left; display: inline-block; white-space: pre-wrap; border-right: 2px solid #0f0; padding-right:5px;}
input, button { padding: 12px 20px; font-size: 18px; border-radius: 8px; border: 2px solid #0f0; background-color: #000; color: #0f0; margin-top: 10px; outline: none; }
button { animation: parpadeo 1s infinite alternate; }
button:hover { background-color: #0f0; color: #000; cursor: pointer; }
@keyframes parpadeo { from { box-shadow:0 0 5px #0f0;} to{box-shadow:0 0 20px #0f0;} }
</style>
</head>
<body>

<h2>Laboratorio Secreto</h2>
<div id="mensaje"></div>

<!-- Botón visible para música -->
<button id="btn_musica">Modo Ambientillo ON (haz clic para escuchar música)</button>

<!-- Zona de código -->
<div id="zona_codigo" style="display:none; margin-top:30px;">
    <p>Introduce el código de 4 cifras:</p>
    <input type="text" id="codigo" maxlength="4">
    <br>
    <button id="btn_enviar">Enviar código</button>
</div>

<!-- Botón de pista -->
<div id="boton_pista" style="display:none; margin-top:20px;">
    <button id="btn_pista">PISTA SUPERSECRETA</button>
</div>

<!-- Audio con controles ocultos para que sea seguro -->
<audio id="musica_fondo" preload="auto">
    <source src="musica_fondo.ogg" type="audio/ogg">
    <source src="musica_fondo.mp3" type="audio/mpeg">
</audio>

<audio id="audio_pista" preload="auto">
    <source src="audio_pista.ogg" type="audio/ogg">
    <source src="audio_pista.mp3" type="audio/mpeg">
</audio>

<script>
const codigoCorrecto = "7391";
const frasesError = ["buaaa das pena","mongol","destilas mediocridad"];

// Función de escritura tipo terminal
function escribirMensaje(texto) {
    const cont = document.getElementById('mensaje');
    cont.textContent = "";
    for (let i=0; i<texto.length; i++){
        setTimeout(()=> { cont.textContent += texto[i]; }, i*50);
    }
}

// BOTÓN MÚSICA: reproducción directa desde clic
document.getElementById('btn_musica').addEventListener('click', function(){
    const bg = document.getElementById('musica_fondo');
    bg.volume = 0.3;
    bg.play().catch(err=>console.log(err)); // reproducción garantizada por el clic

    escribirMensaje("Bienvenidos Josin y Emilia al laboratorio secreto, introduzcan el código correcto para desbloquear la pista");
    document.getElementById('zona_codigo').style.display='block';
    this.style.display='none';
});

// BOTÓN ENVIAR CÓDIGO
document.getElementById('btn_enviar').addEventListener('click', function(){
    const codigo = document.getElementById('codigo').value;
    if(codigo === codigoCorrecto){
        escribirMensaje("Reconocimiento completado. ¡Pulsa PISTA SUPERSECRETA!");
        document.getElementById('boton_pista').style.display='block';
    } else {
        const frase = frasesError[Math.floor(Math.random()*frasesError.length)];
        escribirMensaje(frase);
        document.getElementById('codigo').value = "";
    }
});

// BOTÓN PISTA: reproducción directa desde clic
document.getElementById('btn_pista').addEventListener('click', function(){
    const pista = document.getElementById('audio_pista');
    pista.play().catch(err=>console.log(err)); // reproducción garantizada por clic
});
</script>

</body>
</html>
