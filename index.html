<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Laboratorio Secreto</title>

<style>

body {
    background: url('laboratorio.jpg') no-repeat center center fixed;
    background-size: cover;
    color: #0f0;
    font-family: 'Courier New', monospace;
    text-align: center;
    padding-top: 50px;
}

h2 {
    font-size: 36px;
    text-shadow: 0 0 10px #0f0;
    margin-bottom: 20px;
}

#nota_volumen{
    font-size:20px;
    margin-bottom:25px;
    text-shadow:0 0 8px #0f0;
}

#aviso_codigo{
    color:#ff4444;
    font-size:16px;
    margin-bottom:10px;
}

#pantalla_pista{

    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    color:white;
    font-size:60px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    z-index:9999;

}

input, button {

    padding: 12px 20px;
    font-size: 18px;
    border-radius: 8px;
    border: 2px solid #0f0;
    background-color: #000;
    color: #0f0;
    margin-top: 10px;
    outline: none;

}

button {
    animation: parpadeo 1s infinite alternate;
}

button:hover {
    background-color: #0f0;
    color: #000;
    cursor: pointer;
}

@keyframes parpadeo {
    from { box-shadow: 0 0 5px #0f0; }
    to { box-shadow: 0 0 20px #0f0; }
}

</style>
</head>

<body>

<h2>Laboratorio Secreto</h2>

<p id="nota_volumen">⚠️ Por favor, suban el volumen antes de proceder</p>

<button id="btn_inicio">Activar Laboratorio Secreto</button>

<div id="zona_codigo" style="display:none; margin-top:30px;">

<p id="aviso_codigo">⚠️ NO introducir código hasta finalizar las instrucciones</p>

<p>Introduce el código de 4 cifras:</p>

<input type="text" id="codigo" maxlength="4" autofocus>

<br>

<button onclick="verificarCodigo()">Enviar</button>

</div>

<div id="pantalla_pista">
PISTA DESBLOQUEADA
</div>

<audio id="musica_fondo" src="musica_fondo.mp3.mp3" loop></audio>

<script>

const frasesError = [
"buaaa das pena",
"mongol",
"destilas mediocridad"
];

const codigoCorrecto = "7391";

const musica = document.getElementById('musica_fondo');

const listaAudios = [

"Joker",
"Gladiador",
"Dragonborn",
"Arcade",
"Careme",
"Petra",
"Dragonball",
"Itxel",
"Potter",
"Barrilete",
"Salacia",
"Marvel",
"Videoclub",
"Underworld",
"Pactum",
"Entrevista",
"Haunted",
"Ratas",
"Goonies"

];

function hablar(texto, callback=null){

musica.volume = 0.15;

const synth = window.speechSynthesis;
const utter = new SpeechSynthesisUtterance(texto);

utter.lang = 'es-ES';
utter.pitch = 1.2;
utter.rate = 0.9;
utter.volume = 1;

utter.onend = function(){

musica.volume = 1;

if(callback){
callback();
}

};

synth.speak(utter);

}

document.getElementById('btn_inicio').addEventListener('click', function(){

this.style.display = 'none';

document.getElementById('nota_volumen').style.display = 'none';

document.getElementById('zona_codigo').style.display = 'block';

const bg = document.getElementById('musica_fondo');

bg.volume = 1;

bg.play().catch(error => {

console.log("Error al reproducir música:", error);

});

hablar("Bienvenidos josín y emilia al laboratorio secreto. Por favor, introduzcan el código de 4 cifras para poder continuar. No se preocupen, sabemos que tienen fama de ser algo ineptos, con lo que no bloquearán el sistema si se confunden con el código, aunque si que demostrarán su inutilidad. Buena suerte.");

});

function reproducirAudiosSecuencial(index){

if(index >= listaAudios.length){
return;
}

const audio = new Audio(listaAudios[index]);

audio.play();

audio.onended = function(){

setTimeout(function(){

reproducirAudiosSecuencial(index + 1);

},2000);

};

}

function verificarCodigo(){

const codigo = document.getElementById('codigo').value;

if(codigo === codigoCorrecto){

musica.pause();

document.body.style.background="black";

document.getElementById("pantalla_pista").style.display="flex";

setTimeout(function(){

reproducirAudiosSecuencial(0);

},2000);

}else{

const frase = frasesError[Math.floor(Math.random() * frasesError.length)];

hablar(frase);

document.getElementById('codigo').value = "";
document.getElementById('codigo').focus();

}

}

</script>

</body>
</html>
