<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Laboratorio Secreto</title>
<style>
body {
    background: url('laboratorio.jpg') no-repeat center center fixed;
    background-size: cover;
    color: #0f0;
    font-family: 'Courier New', monospace;
    text-align: center;
    padding-top: 50px;
}

h2 { font-size: 36px; text-shadow: 0 0 10px #0f0; margin-bottom: 20px; }

#nota_volumen {
    font-size:20px;
    margin-bottom:25px;
    text-shadow:0 0 8px #0f0;
}

#aviso_codigo {
    color:#ff4444;
    font-size:16px;
    margin-bottom:10px;
}

#pista_desbloqueada {
    display:none;
    font-size:70px;
    color:#0f0;
    text-shadow: 0 0 10px #0f0, 0 0 20px #0f0;
    margin-top: 30px;
    flex-direction: column;
}

#btn_repetir {
    display:none;
    margin-top: 40px;
    padding: 12px 30px;
    font-size: 24px;
    border-radius: 10px;
    border: 2px solid #0f0;
    background-color: #000;
    color: #0f0;
    cursor: pointer;
}

#btn_repetir:hover {
    background-color: #0f0;
    color: #000;
}

input, button {
    padding: 12px 20px;
    font-size: 18px;
    border-radius: 8px;
    border: 2px solid #0f0;
    background-color: #000;
    color: #0f0;
    margin-top: 10px;
    outline: none;
}

button {
    animation: parpadeo 1s infinite alternate;
}

button:hover {
    background-color: #0f0;
    color: #000;
    cursor: pointer;
}

@keyframes parpadeo {
    from { box-shadow: 0 0 5px #0f0; }
    to { box-shadow: 0 0 20px #0f0; }
}
</style>
</head>

<body>

<h2>Laboratorio Secreto</h2>

<p id="nota_volumen">⚠️ Por favor, suban el volumen antes de proceder</p>

<button id="btn_inicio">Activar Laboratorio Secreto</button>

<div id="zona_codigo" style="display:none; margin-top:30px;">
    <p id="aviso_codigo">⚠️ NO introducir código hasta finalizar las instrucciones</p>
    <p>Introduce el código de 4 cifras:</p>
    <input type="text" id="codigo" maxlength="4" autofocus>
    <br>
    <button onclick="verificarCodigo()">Enviar</button>
</div>

<div id="pista_desbloqueada">
    PISTA DESBLOQUEADA
    <button id="btn_repetir" onclick="repetirPista()">Repetir Pista</button>
</div>

<audio id="musica_fondo" src="musica_fondo.mp3.mp3" loop></audio>

<script>
const frasesError = ["buaaa das pena","mongol","destilas mediocridad"];
const codigoCorrecto = "7391";
const musica = document.getElementById('musica_fondo');
const listaAudios = [
"Joker","Gladiador","Dragonborn","Arcade","Careme","Petra","Dragonball","Itxel","Potter",
"Barrilete","Salacia","Marvel","Videoclub","Underworld","Pactum","Entrevista","Haunted","Ratas","Goonies"
];

// Función para hablar con robot
function hablar(texto, callback=null){
    musica.volume = 0.15;
    const synth = window.speechSynthesis;
    const utter = new SpeechSynthesisUtterance(texto);
    utter.lang = 'es-ES';
    utter.pitch = 1.2;
    utter.rate = 0.9;
    utter.volume = 1;
    utter.onend = function(){
        musica.volume = 1;
        if(callback){ callback(); }
    };
    synth.speak(utter);
}

// Botón iniciar laboratorio
document.getElementById('btn_inicio').addEventListener('click', function(){
    this.style.display = 'none';
    document.getElementById('nota_volumen').style.display = 'none';
    document.getElementById('zona_codigo').style.display = 'block';
    musica.play().catch(e=>console.log(e));
    hablar("Bienvenidos josín y emilia al laboratorio secreto. Por favor, introduzcan el código de 4 cifras para poder continuar. No se preocupen, sabemos que tienen fama de ser algo ineptos, con lo que no bloquearán el sistema si se confunden con el código, aunque sí que demostrarán su inutilidad. Buena suerte.");
});

// Reproducir audios secuencial con control de mostrar botón al final
function reproducirAudiosSecuencial(index){
    if(index >= listaAudios.length){
        document.getElementById('btn_repetir').style.display = 'block';
        return;
    }
    const audio = new Audio(listaAudios[index]);
    audio.play();
    audio.onended = function(){
        setTimeout(()=>reproducirAudiosSecuencial(index+1),2000);
    };
}

// Verificar código
function verificarCodigo(){
    const codigo = document.getElementById('codigo').value;
    if(codigo === codigoCorrecto){
        musica.pause();
        // ocultar zona de código y aviso
        document.getElementById('zona_codigo').style.display = 'none';
        document.getElementById('aviso_codigo').style.display = 'none';
        // mostrar texto pista desbloqueada
        document.getElementById('pista_desbloqueada').style.display = 'flex';
        
        // robot habla antes de reproducir audios
        hablar("Reconocimiento completado, adelante la siguiente pista", function(){
            hablar("Iniciando pista en 3, 2, 1", function(){
                reproducirAudiosSecuencial(0);
            });
        });

    } else {
        const frase = frasesError[Math.floor(Math.random() * frasesError.length)];
        hablar(frase);
        document.getElementById('codigo').value = "";
        document.getElementById('codigo').focus();
    }
}

// Función para repetir la pista
function repetirPista(){
    document.getElementById('btn_repetir').style.display = 'none';
    reproducirAudiosSecuencial(0);
}
</script>

</body>
</html>
