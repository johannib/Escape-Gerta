<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Prueba Audio Escape Room</title>
</head>
<body>

<h2>Prueba de Audios</h2>

<!-- Botón directo para música -->
<button onclick="document.getElementById('musica').play()">Escuchar música de fondo</button>
<audio id="musica" preload="auto">
  <source src="musica_fondo_v2.mp3" type="audio/mpeg">
  <source src="musica_fondo_v2.ogg" type="audio/ogg">
</audio>

<br><br>

<!-- Botón directo para pista -->
<button onclick="document.getElementById('pista').play()">Escuchar pista</button>
<audio id="pista" preload="auto">
  <source src="audio_pista_v2.mp3" type="audio/mpeg">
  <source src="audio_pista_v2.ogg" type="audio/ogg">
</audio>

</body>
</html>
